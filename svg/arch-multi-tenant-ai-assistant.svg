<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .box { fill: #eef4ff; stroke: #3b6fd6; stroke-width: 1.5; rx: 8; }
      .box-data { fill: #fff7e6; stroke: #d99000; stroke-width: 1.5; rx: 8; }
      .box-tool { fill: #ecfdf5; stroke: #0f9d6b; stroke-width: 1.5; rx: 8; }
      .lbl { fill: #1e293b; text-anchor: middle; }
      .sub { fill: #64748b; font-size: 11; text-anchor: middle; }
      .edge { stroke: #475569; stroke-width: 1.5; fill: none; }
      .elbl { fill: #334155; font-size: 11; text-anchor: middle; }
    </style>
  </defs>

  <!-- 主链路 -->
  <rect class="box" x="10" y="150" width="130" height="54"/>
  <text class="lbl" x="75" y="174">运营前端</text>
  <text class="sub" x="75" y="192">抽屉式聊天面板</text>

  <rect class="box" x="180" y="150" width="140" height="54"/>
  <text class="lbl" x="250" y="174">聊天接口</text>
  <text class="sub" x="250" y="192">SSE 端点</text>

  <rect class="box" x="360" y="150" width="130" height="54"/>
  <text class="lbl" x="425" y="174">编排服务</text>
  <text class="sub" x="425" y="192">会话与工具调度</text>

  <!-- 三分支 -->
  <rect class="box" x="540" y="40" width="160" height="54"/>
  <text class="lbl" x="620" y="64">模型工厂</text>
  <text class="sub" x="620" y="82">按租户取建模型</text>

  <rect class="box-tool" x="540" y="150" width="150" height="54"/>
  <text class="lbl" x="615" y="174">工具桥接层</text>
  <text class="sub" x="615" y="192">注解转工具回调</text>

  <rect class="box" x="540" y="260" width="150" height="54"/>
  <text class="lbl" x="615" y="284">RAG 知识库</text>
  <text class="sub" x="615" y="302">向量检索</text>

  <!-- 末端 -->
  <rect class="box-data" x="740" y="40" width="150" height="54"/>
  <text class="lbl" x="815" y="64">大模型实例</text>
  <text class="sub" x="815" y="82">DeepSeek/GLM/Qwen</text>

  <rect class="box-tool" x="740" y="150" width="130" height="54"/>
  <text class="lbl" x="805" y="174">16 个业务工具</text>
  <text class="sub" x="805" y="192">查询与写操作</text>

  <!-- 箭头 -->
  <line class="edge" x1="140" y1="177" x2="178" y2="177" marker-end="url(#arrow)"/>
  <text class="elbl" x="159" y="170">POST</text>

  <line class="edge" x1="320" y1="177" x2="358" y2="177" marker-end="url(#arrow)"/>

  <line class="edge" x1="490" y1="165" x2="538" y2="80" marker-end="url(#arrow)"/>
  <line class="edge" x1="490" y1="177" x2="538" y2="177" marker-end="url(#arrow)"/>
  <line class="edge" x1="490" y1="190" x2="538" y2="275" marker-end="url(#arrow)"/>

  <line class="edge" x1="700" y1="67" x2="738" y2="67" marker-end="url(#arrow)"/>
  <line class="edge" x1="690" y1="177" x2="738" y2="177" marker-end="url(#arrow)"/>

  <!-- 流式回流 -->
  <path class="edge" d="M 815 94 C 815 20, 250 20, 250 148" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
  <text class="elbl" x="530" y="16">流式增量回前端</text>
</svg>
